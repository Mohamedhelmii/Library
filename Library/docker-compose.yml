version: "3.8"
services:
    sql-server:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: sql-container
        environment:
            - ACCEPT_EULA=Y
            - MSSQL_SA_PASSWORD=${SQL_PASSWORD}
        ports:
            - "1433:1433"
        volumes:
            - mssql_data:/var/opt/mssql 
    library-api:
        # build: .
        image: mohamedhelmyy/library_api:v3
        container_name: library-api-container
        ports:
            - "8080:8080"
        depends_on:
            - sql-server
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ConnectionStrings__DefaultConnection=Server=sql-server;Database=${DB_NAME};User Id=${DB_USER};Password=moHamed@2002;TrustServerCertificate=True; 
volumes:
    mssql_data:
        external: true